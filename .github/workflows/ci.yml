name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs on the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.22"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dev deps
        run: uv sync --group dev --frozen

      - name: Ruff lint
        run: uv run ruff check app tests frontend

      - name: Ruff format check
        run: uv run ruff format --check app tests frontend

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.22"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dev deps
        run: uv sync --group dev --frozen

      - name: Run alembic migrations (sanity)
        run: uv run alembic upgrade head

      - name: Run pytest (fast)
        env:
          # Tests rely on JWT secret being set; avoids the ephemeral-key warning
          # noise without exposing real credentials.
          JWT_SECRET_KEY: ci-test-jwt-not-used-outside-runner
        run: uv run pytest tests/ -q

      - name: Run pytest (slow / SLA)
        env:
          JWT_SECRET_KEY: ci-test-jwt-not-used-outside-runner
        run: uv run pytest tests/ -m slow -v

  docker-build:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: mini-plataforma-analise-dados:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          load: true
          tags: mini-plataforma-analise-dados-ui:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image size under 500MB
        run: |
          SIZE=$(docker image inspect mini-plataforma-analise-dados:ci --format='{{.Size}}')
          MB=$((SIZE / 1024 / 1024))
          echo "API image size: ${MB}MB"
          if [ "$MB" -gt 500 ]; then
            echo "❌ Image exceeds 500MB SLA"
            exit 1
          fi
